name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Python 환경 세팅
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. pytest 실행 (tests/ 폴더 기준)
      - name: Run tests
        run: pytest -q || echo "⚠️ No tests found, skipping..."

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test   # 테스트가 성공해야 실행됨

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 5. Docker 빌드
      - name: Build Docker image
        run: docker build -t wine-reco:ci .

      # 6. DockerHub 로그인 (Secrets 필요)
      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. DockerHub 푸시
      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag wine-reco:ci ${{ secrets.DOCKERHUB_USERNAME }}/wine-reco:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wine-reco:latest
